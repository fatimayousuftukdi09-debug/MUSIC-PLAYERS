<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">

    <title>Music Player</title>
</head>
<body>

    <header>

    <nav class="navbar">

        <h2 class="logo"><u><i>ECHO BEATS</i></u></h2>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="playlist.html">Playlist</a></li>
            <li><a href="artists.html">Artists</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>

    </nav>

</header>
      <div class="container">

    <div class="music-player">

    </div>

</div>
<div class="top-bar">
    <span>☰</span>
    <span>♡</span>
</div>

<div class="album">
    <img src="https://d1csarkz8obe9u.cloudfront.net/posterpreviews/album-cover-template-design-32fd5e6c5ee876f7ee1cfa1eb8a75bbc_screen.jpg?ts=1680985862" alt="album cover">
</div>

<div class="song-info">
    <h2>Blinding Lights</h2>
    <p><u>The Weeknd</u></p>
</div>

<div class="progress-section">

    <div class="progress-bar">
        <div class="progress"></div>
    </div>

    <div class="time">
        <span>1:15</span>
        <span>3:45</span>
    </div>

</div>

<div class="controls">

    <button class="control-btn">⏮</button>

    <button class="play-btn">▶</button>

    <button class="control-btn">⏭</button>

</div>

<div class="now-playing">
    <p>🎵 NOW PLAYING</p>
</div>

<div class="volume">

    <span>🔉</span>

    <input type="range" min="0" max="100" value="70">

    <span>🔊</span>

</div>

<p class="footer-text">
    Enjoy your favorite music anytime 🎶
</p>
